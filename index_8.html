<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Squad Velocity Atlas — DemandSupply Sprints 04, 06–10</title><style>*, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; }
html, body { margin: 0; padding: 0; }
body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; background: #F1E8D2; color: #2A2520; }

/* Layout */
.relative { position: relative; }
.fixed { position: fixed; }
.sticky { position: sticky; }
.inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
.top-0 { top: 0; }
.flex { display: flex; }
.grid { display: grid; }
.flex-wrap { flex-wrap: wrap; }
.items-baseline { align-items: baseline; }
.items-center { align-items: center; }
.items-end { align-items: flex-end; }
.justify-between { justify-content: space-between; }
.ml-auto { margin-left: auto; }
.mx-auto { margin-left: auto; margin-right: auto; }
.min-h-screen { min-height: 100vh; }
.h-full { height: 100%; }
.h-px { height: 1px; }

.h-2 { height: 0.5rem; }

.w-full { width: 100%; }
.max-w-xs { max-width: 20rem; }
.max-w-2xl { max-width: 42rem; }
.max-w-7xl { max-width: 80rem; }
.overflow-hidden { overflow: hidden; }
.overflow-auto { overflow: auto; }

.grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
.grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
@media (min-width: 768px) {
  .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .md\:px-8 { padding-left: 2rem; padding-right: 2rem; }
  .md\:py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
  .md\:text-5xl { font-size: 3rem; line-height: 1; }
  .md\:col-span-2 { grid-column: span 2 / span 2; }
}
@media (min-width: 1024px) {
  .lg\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

.gap-1 { gap: 0.25rem; }
.gap-1\.5 { gap: 0.375rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }

.p-0\.5 { padding: 0.125rem; }

.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
.py-0\.5 { padding-top: 0.125rem; padding-bottom: 0.125rem; }
.py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
.py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }

.py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }

.pb-6 { padding-bottom: 1.5rem; }

.mb-4 { margin-bottom: 1rem; }
.mb-8 { margin-bottom: 2rem; }

/* === BEIGE THEME — ink-on-paper === */
/* Text greys repurposed to warm-dark scale */
.text-slate-50  { color: #1A140A; }   /* near-black, headlines */
.text-slate-100 { color: #261E10; }   /* primary body */
.text-slate-200 { color: #3A2E1B; }
.text-slate-300 { color: #564732; }
.text-slate-400 { color: #786950; }   /* muted sub-text */
.text-slate-500 { color: #9A8B6E; }   /* most muted */

/* Backgrounds: paper-on-paper warm tints */
.bg-slate-600 { background-color: #B5A481; }
.bg-white\/5 { background-color: rgba(60, 45, 20, 0.05); }
.hover\:bg-white\/5:hover { background-color: rgba(60, 45, 20, 0.06); }

/* Borders */
.border-white\/10 { border-color: rgba(60, 45, 20, 0.12); }
.divide-white\/5 > * + * { border-color: rgba(60, 45, 20, 0.08); }

/* Squad colors — deepened for contrast on beige */
.bg-amber-400 { background-color: #C26C13; }
.bg-teal-400  { background-color: #0F766E; }
.bg-rose-400  { background-color: #B83A5C; }
.bg-amber-400\/10 { background-color: rgba(194,108,19,0.12); }
.bg-teal-400\/10  { background-color: rgba(15,118,110,0.12); }
.bg-rose-400\/10  { background-color: rgba(184,58,92,0.12); }
.text-amber-300 { color: #B85F0A; }
.text-teal-300  { color: #0B5F58; }
.text-rose-300  { color: #9E2F4F; }
.text-emerald-300 { color: #166534; }
.border-amber-400\/30 { border-color: rgba(194,108,19,0.35); }
.border-teal-400\/30  { border-color: rgba(15,118,110,0.35); }
.border-rose-400\/30  { border-color: rgba(184,58,92,0.35); }

.opacity-50 { opacity: 0.5; }
.outline-none { outline: 2px solid transparent; outline-offset: 2px; }
.transition { transition-property: color, background-color, border-color, opacity; transition-duration: 150ms; }
.pointer-events-none { pointer-events: none; }

input { font-family: inherit; font-size: inherit; color: inherit; }
table { border-collapse: collapse; }
button { font-family: inherit; cursor: pointer; background: none; border: 0; color: inherit; }
